batch_size: 4
iters: 5000

train_dataset:
  type: Pscde
  dataset_root: data/pscde
  transforms:
    #- type: ResizeStepScaling  # 新增加的 transforms
    #  min_scale_factor: 0.5
    #  max_scale_factor: 2.0
    #  scale_step_size: 0.25
    - type: RandomPaddingCrop
      crop_size: [512, 512]
    - type: RandomHorizontalFlip
    - type: RandomDistort
      brightness_range: 0.5  #default 0.4--->0.5
      contrast_range: 0.5
      saturation_range: 0.5
    - type: Normalize
  mode: train

val_dataset:
  type: Pscde
  dataset_root: data/pscde
  transforms:
    - type: Normalize
  mode: test


optimizer:
  type: SGD
  momentum: 0.9
  weight_decay: 4.0e-5

lr_scheduler:
  type: PolynomialDecay
  learning_rate: 0.01
  end_lr: 0
  power: 0.9

loss:
  types:
    - type: CrossEntropyLoss
  coef: [1]
