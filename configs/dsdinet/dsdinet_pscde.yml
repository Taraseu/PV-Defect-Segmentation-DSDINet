_base_: '../_base_/pscde.yml'

batch_size: 4 
iters: 15000

model:
  type: ELFormer
  backbone:
    type: MixVisionTransformer_B1
    pretrained: https://bj.bcebos.com/paddleseg/dygraph/backbone/mix_vision_transformer_b1.tar.gz
  embedding_dim: 256
  num_classes: 2

optimizer:
  _inherited_: False
  type: AdamW
  beta1: 0.9
  beta2: 0.999
  weight_decay: 0.01

lr_scheduler:
  type: PolynomialDecay
  learning_rate: 0.00006
  power: 1

loss:
  types:
    - type: CrossEntropyLoss
  coef: [1]
 